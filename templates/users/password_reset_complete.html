{% extends 'base.html' %} {% load static %} {% block content %}
<style>
  .glass-card {
    background: rgba(255,255,255,0.75) !important;
    backdrop-filter: blur(16px);
    border: 1px solid rgba(0,0,0,0.08) !important;
    box-shadow: 0 20px 40px rgba(0,0,0,0.04) !important;
    border-radius: 24px !important;
  }
  .dark-mode .glass-card {
    background: rgba(31,41,55,0.75) !important;
    border: 1px solid rgba(255,255,255,0.08) !important;
  }
  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounceIn {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }
  .success-circle {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D1FAE5, #6EE7B7);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 30px rgba(16,185,129,0.4);
    animation: bounceIn 0.7s ease-out forwards;
  }
  .dark-mode .success-circle {
    background: linear-gradient(135deg, #064E3B, #065F46);
  }
</style>

<div class="row justify-content-center mt-4" style="position: relative; overflow: visible;">
  <div style="position: absolute; top: -30px; left: 20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(16,185,129,0.25) 0%, rgba(16,185,129,0) 70%); filter: blur(40px); pointer-events: none; z-index: 0;"></div>

  <div class="col-md-5" style="position: relative; z-index: 1; animation: slideUpFade 0.6s ease-out forwards;">
    <div class="card p-4 p-md-5 glass-card text-center">
      <div class="success-circle">
        <i class="fas fa-check" style="font-size: 2.5rem; color: #059669;"></i>
      </div>

      <h3 class="fw-bold">Password Reset! 🎉</h3>
      <p class="text-muted mb-4" style="font-size: 0.95rem;">
        Your password has been successfully updated.<br>
        You can now log in with your new password!
      </p>

      <a href="{% url 'login' %}" class="btn btn-purple w-100 btn-lg">
        <i class="fas fa-sign-in-alt me-2"></i> Login Now
      </a>

      <p class="text-muted mt-3" style="font-size: 0.82rem;">
        <i class="fas fa-shield-alt me-1" style="color: #10B981;"></i>
        Keep your password safe and don't share it with anyone!
      </p>
    </div>
  </div>
</div>
{% endblock %}
