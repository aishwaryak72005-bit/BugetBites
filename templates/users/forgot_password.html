{% extends 'base.html' %} {% load static %} {% block content %}
<style>
  .glass-card {
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 0, 0, 0.08) !important;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04) !important;
    border-radius: 24px !important;
  }
  .dark-mode .glass-card {
    background: rgba(31, 41, 55, 0.75) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25) !important;
  }
  .login-input {
    border-radius: 14px !important;
    border: 2px solid #E2E8F0 !important;
    padding: 13px 18px !important;
    font-size: 0.95rem !important;
    transition: all 0.2s ease !important;
    background: #FFFFFF !important;
  }
  .login-input:focus {
    border-color: #10B981 !important;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
  }
  .dark-mode .login-input {
    background: #374151 !important;
    border-color: rgba(255, 255, 255, 0.1) !important;
    color: #F9FAFB !important;
  }
  .dark-mode .login-input:focus {
    border-color: #10B981 !important;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25) !important;
  }
  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .icon-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D1FAE5, #A7F3D0);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 8px 20px rgba(16,185,129,0.25);
  }
  .dark-mode .icon-circle {
    background: linear-gradient(135deg, #064E3B, #065F46);
  }
</style>

<div class="row justify-content-center mt-4" style="position: relative; overflow: visible;">
  <!-- Glow Circles -->
  <div style="position: absolute; top: -30px; left: 20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(16,185,129,0.22) 0%, rgba(16,185,129,0) 70%); filter: blur(40px); pointer-events: none; z-index: 0;"></div>
  <div style="position: absolute; bottom: -30px; right: 20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, rgba(124,58,237,0) 70%); filter: blur(40px); pointer-events: none; z-index: 0;"></div>

  <div class="col-md-5" style="position: relative; z-index: 1; animation: slideUpFade 0.6s ease-out forwards;">
    <div class="card p-4 p-md-5 glass-card">
      <div class="text-center mb-4">
        <div class="icon-circle">
          <i class="fas fa-key" style="font-size: 1.8rem; color: #059669;"></i>
        </div>
        <h3 class="fw-bold mt-2">Forgot Password?</h3>
        <p class="text-muted" style="font-size: 0.9rem;">
          No worries! Enter your email address and we'll send you a reset link.
        </p>
      </div>

      <form method="POST" id="forgotForm">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label" style="font-weight: 600;">
            <i class="fas fa-envelope me-1" style="color: #059669;"></i> Email Address
          </label>
          <input
            type="email"
            name="email"
            class="form-control form-control-lg login-input"
            placeholder="Enter your registered email"
            required
            autofocus
          />
          <small class="text-muted mt-1 d-block">
            <i class="fas fa-info-circle me-1"></i>
            Enter the email you used when registering.
          </small>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-purple w-100 btn-lg">
          <i class="fas fa-paper-plane me-2"></i> Send Reset Link
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="{% url 'login' %}" style="color: #059669; font-weight: 600; text-decoration: none; font-size: 0.9rem;">
          <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('forgotForm').addEventListener('submit', function() {
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Sending...';
    setTimeout(() => { btn.disabled = true; }, 1);
  });
</script>
{% endblock %}
